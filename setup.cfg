[coverage:run]
source = app
concurrency = thread
branch = true
omit =
    # Requires live OTLP collector — no-op when OTEL_ENABLED=false
    app/telemetry.py
    # Outbox delivery loop requires live Postgres + external HTTP endpoints
    # The schedule_webhook() function (write path) IS tested via integration tests
    app/services/webhook.py

[coverage:report]
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    if TYPE_CHECKING:
    \.\.\.
    if __name__ == .__main__.:
    @abstractmethod
